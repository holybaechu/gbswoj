services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - 4000:4000
    environment:
      - PORT=4000
    depends_on:
      - backend
  backend:
    # restart: on-failure
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - 3000:3000
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
  judger:
    # restart: on-failure
    build:
      context: .
      dockerfile: apps/judger/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    depends_on:
      - redis
  redis:
    image: redis:8.6.2
    ports:
      - 6379:6379