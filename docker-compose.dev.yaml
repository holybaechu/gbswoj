services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/backend/node_modules
    ports:
      - 3000:3000
      - 4000:4000
      - 5173:5173
    environment:
      - REDIS_URL=redis://redis:6379
      - HOST=0.0.0.0
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    depends_on:
      - redis

  redis:
    image: redis:8.6.2
    ports:
      - 6379:6379
